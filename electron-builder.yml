appId: 'minemonlauncher'
productName: 'Minemon Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright 2024-2026 Minemon'

asar: true
compression: 'maximum'

# Icono por defecto para todas las plataformas
icon: 'build/icon'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

directories:
  buildResources: 'build'
  output: 'dist'

# Windows Configuration
win:
  icon: 'build/icon.ico'
  target:
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: 'build/icon.ico'
  uninstallerIcon: 'build/icon.ico'
  installerHeaderIcon: 'build/icon.ico'

# macOS Configuration
mac:
  icon: 'build/icon.png'
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  icon: 'build/icon.png'
  target: 'AppImage'
  maintainer: 'Minemon'
  vendor: 'Minemon'
  synopsis: 'Launcher del servidor Minemon con Cobblemon'
  description: 'Launcher personalizado para el servidor Minemon de Minecraft con el mod Cobblemon.'
  category: 'Game'

# Auto-updater Configuration
publish:
  - provider: github
    owner: sharkz-dev
    repo: minemon-launcher
