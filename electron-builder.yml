appId: 'minemonlauncher'
productName: 'Minemon Launcher'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright 2024-2026 Minemon'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win:
  target:
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  target: 'AppImage'
  maintainer: 'Minemon'
  vendor: 'Minemon'
  synopsis: 'Launcher del servidor Minemon con Cobblemon'
  description: 'Launcher personalizado para el servidor Minemon de Minecraft con el mod Cobblemon. Todos los mods, configuraciones y actualizaciones se manejan automaticamente.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'

# Auto-updater Configuration
publish:
  - provider: github
    owner: TU_USUARIO_GITHUB
    repo: TU_REPOSITORIO
